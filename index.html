<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 25px;">
            <h1>Shopify</h1>

            <div id="filters">
                <button onclick="filterCategory('all', event)">All</button>
                <button onclick="filterCategory('electronics', event)">Electronics</button>
                <button onclick="filterCategory('fashion', event)">Fashion</button>
                <button onclick="filterCategory('home', event)">Home</button>
            </div>
        </div>

        <div style="display: flex; gap: 20px; align-items: center;">
            <input type="text" id="search" placeholder="Search products...">

            <select id="sort">
                <option value="" disabled selected>Sort</option>
                <option value="low-high">Price: Low → High</option>
                <option value="high-low">Price: High → Low</option>
            </select>

            <div class="wishlist-nav" onclick="showWishlist()">
                <img src="icons/white_heart.png" class="nav-icon"> <span id="wishlist-count">0</span>
            </div>

            <div class="cart" onclick="toggleCart()">
                <img src="icons/cart.png" class="nav-icon"> <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div id="products" class="product-container"></div>

    <div id="overlay" onclick="toggleCart()"></div>

    <div id="cart-panel">

        <div class="cart-header">
            <h2>Your Cart</h2>
            <button onclick="toggleCart()">✖</button>
        </div>

        <div class="cart-body">
            <div id="cart-items"></div>
        </div>

        <div class="cart-footer">
            <h3>Total: ₹<span id="total">0</span></h3>
            <button id="checkout-btn">Proceed to Buy</button>
            <button id="clear-cart-btn" onclick="clearCart()">Clear Cart</button>
        </div>

    </div>

    <div id="toast">Added to cart</div>


    <div id="product-modal" class="modal">
        <div class="modal-content">

            <span onclick="closeProduct()" class="close-btn">✖</span>

            <img id="modal-img">
            <h2 id="modal-name"></h2>
            <p id="modal-price"></p>
            <p id="modal-desc" class="modal-desc"></p>

            <div id="modal-cart-btn"></div>

        </div>
    </div>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">

            <h2>Checkout</h2>

            <div id="checkout-items"></div>

            <h3>Total: ₹<span id="checkout-total"></span></h3>

            <button onclick="placeOrder()">Place Order</button>

            <button onclick="closeCheckout()">Cancel</button>

        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
